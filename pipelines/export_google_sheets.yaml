pipeline:
  id: export_google_sheets
  purpose: value_only_compatibility_exports
  required_inputs:
    - outputs/json/export-manifest.json
  produces:
    - outputs/xlsx/
    - outputs/csv/
  stage_artifacts:
    - export_manifest
    - value_only_exports
  export_profiles:
    marketing-homework:
      required_artifacts:
        - outputs/json/marketing-homework.json
      outputs:
        - outputs/xlsx/marketing-homework.xlsx
        - outputs/csv/marketing-homework.csv
    custdev-simulated:
      required_artifacts:
        - outputs/json/custdev-simulated.json
      outputs:
        - outputs/xlsx/custdev-simulated.xlsx
        - outputs/csv/custdev-simulated.csv
    interview-synthesis:
      required_artifacts:
        - outputs/json/interview-synthesis.json
      outputs:
        - outputs/xlsx/interview-synthesis.xlsx
        - outputs/csv/interview-clusters.csv
    lpr-discovery:
      required_artifacts:
        - outputs/json/lpr-discovery.json
      outputs:
        - outputs/xlsx/lpr-discovery.xlsx
        - outputs/csv/lpr-candidates.csv
    sales-script:
      required_artifacts:
        - outputs/json/sales-script.json
      outputs:
        - outputs/xlsx/sales-script.xlsx
        - outputs/csv/sales-script-blocks.csv
    sales-script-styled:
      required_artifacts:
        - outputs/json/sales-script-styled.json
      outputs:
        - outputs/xlsx/sales-script-styled.xlsx
        - outputs/csv/sales-script-styled.csv
  submission_packages:
    lecture-1-homework:
      workbook: outputs/xlsx/lecture-1-homework.xlsx
      values_only: true
      sheets:
        - sheet_name: "Демонстрация"
          source_profiles:
            - marketing-homework
          source_artifacts:
            - outputs/json/marketing-homework.json
    lecture-2-homework:
      workbook: outputs/xlsx/lecture-2-homework.xlsx
      values_only: true
      sheets:
        - sheet_name: "Описание ЦА + CustDev"
          source_profiles:
            - custdev-simulated
            - interview-synthesis
          source_artifacts:
            - outputs/json/custdev-simulated.json
            - outputs/json/interview-synthesis.json
        - sheet_name: "Определение ЛПР"
          source_profiles:
            - lpr-discovery
          source_artifacts:
            - outputs/json/lpr-discovery.json
        - sheet_name: "Генерация скрипта"
          source_profiles:
            - sales-script
            - sales-script-styled
          source_artifacts:
            - outputs/json/sales-script.json
            - outputs/json/sales-script-styled.json
    full-homework-submission:
      workbook: outputs/xlsx/homework-submission.xlsx
      values_only: true
      sheets:
        - sheet_name: "Демонстрация"
          source_profiles:
            - marketing-homework
          source_artifacts:
            - outputs/json/marketing-homework.json
        - sheet_name: "Описание ЦА + CustDev"
          source_profiles:
            - custdev-simulated
            - interview-synthesis
          source_artifacts:
            - outputs/json/custdev-simulated.json
            - outputs/json/interview-synthesis.json
        - sheet_name: "Определение ЛПР"
          source_profiles:
            - lpr-discovery
          source_artifacts:
            - outputs/json/lpr-discovery.json
        - sheet_name: "Генерация скрипта"
          source_profiles:
            - sales-script
            - sales-script-styled
          source_artifacts:
            - outputs/json/sales-script.json
            - outputs/json/sales-script-styled.json
  constraints:
    values_only: true
    google_sheets_runtime_dependency: false
  blocking_conditions:
    - missing_required_artifact_for_profile
    - formula_leakage_detected
  resume_from:
    - outputs/json/export-manifest.json
  export_targets:
    - marketing-homework
    - custdev-simulated
    - interview-synthesis
    - lpr-discovery
    - sales-script
    - sales-script-styled
